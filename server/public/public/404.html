<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Listicle - 404</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #312b2b;
        color: #ffffff;
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      }

      main {
        text-align: center;
        padding: 2rem;
      }

    a {
      display: inline-block;
      background-color: #76b8d3;
      text-decoration: none;
      font-weight: 600;
      border: 3px solid #76b8d3;
      border-radius: 10px;
      padding: 5px;
      margin-top: auto;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      color: darkslategray;
      width: max-content;
    }

    a:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px #76b8d3;
    }
    </style>
  </head>

  <body>
    <main>
      <h1>Error 404</h1>
      <p>That page doesn't exist.</p>
      <a href="/">Return Home</a>
    </main>
  </body>
</html>
